server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml
    font/ttf
    font/woff
    font/woff2;

  # Hashed Next assets — long cache
  location /_next/static/ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    access_log off;
  }

  # Static assets
  location ~* \.(?:woff2?|svg|png|jpg|jpeg|webp|avif|ico)$ {
    expires 30d;
    add_header Cache-Control "public" always;
    access_log off;
  }

  # PDFs — short cache so updates propagate quickly
  location ~* \.pdf$ {
    expires 1h;
    add_header Cache-Control "public" always;
    add_header Content-Disposition "attachment" always;
  }

  # HTML — no cache (so deploys are visible immediately)
  location ~* \.html$ {
    add_header Cache-Control "no-cache, must-revalidate" always;
  }

  # Static export: try the URI as a file, then with .html, then as a directory
  location / {
    try_files $uri $uri.html $uri/ =404;
  }

  # Hide nginx version
  server_tokens off;
}
