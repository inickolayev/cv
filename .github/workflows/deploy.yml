name: Deploy to chesswin_server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SSH_HOST: ${{ vars.SSH_HOST }}
      SSH_USER: ${{ vars.SSH_USER }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build static export inside Docker
        run: |
          docker buildx build \
            --target export \
            --output type=local,dest=./out \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            .
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true

      - name: Verify build output
        run: |
          test -f out/index.html
          test -f out/ru/index.html
          test -f out/Nikolaev_Igor_CV_EN.pdf
          test -f out/Nikolaev_Igor_CV_RU.pdf
          echo "Build artefacts OK ($(du -sh out | cut -f1))"

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Sanity-check SSH connection
        run: ssh -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" 'whoami; docker --version'

      - name: Sync static site to server
        # --chmod ensures nginx (inside the container, runs as user `nginx`)
        # can read every file regardless of the runner's umask.
        run: |
          rsync -az --delete --chmod=Du=rwx,Dgo=rx,Fu=rw,Fgo=r \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./out/ \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/site/"

      - name: Sync deploy compose + nginx config to server
        run: |
          rsync -az \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./deploy/docker-compose.yml ./deploy/nginx.conf \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Roll out via docker compose
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 \
            "$SSH_USER@$SSH_HOST" "cd '$DEPLOY_PATH' && \
              echo '🚀 Rolling out CV…' && \
              docker compose pull && \
              docker compose up -d --remove-orphans && \
              docker image prune -f && \
              docker compose ps"

      - name: Smoke test public URL
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -sk -o /dev/null -w "%{http_code}" https://inikolaev.tech/ || true)
            echo "Attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 6
          done
          echo "::warning::Public URL did not return 200 — check DNS (must point to $SSH_HOST) and Traefik logs"
